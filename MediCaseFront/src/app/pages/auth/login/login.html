<div class="absolute inset-0 min-w-full min-h-full z-0">
  <img class="w-full h-full object-cover opacity-50" src="images/jpg/bg.png"/>
</div>

<div class="relative flex flex-col items-center justify-center min-h-screen">
  <div class="flex flex-row items-center justify-center z-10 w-250 h-130 rounded-2xl bg-white gap-20 p-20 shadow-xl">
    <div class="flex flex-col gap-3 w-1/2 items-center">
      <img [src]="APP_CONFIG.logoURL" class="w-1/2">

      <div class="self-start flex flex-col gap-5 w-full">
        <p class=" text-sm text-[#148591]">به مدیکیس خوش اومدی 👋</p>

        <div class="flex flex-col gap-2">
          <label class=" text-gray-500 text-xs" for="username">نام کاربری</label>
          <input [(ngModel)]="username" aria-describedby="username-help"
                 class="placeholder:text-xs placeholder:text-gray-100" id="username"
                 pInputText placeholder="شماره دانشجویی،پرسنلی و یا ایمیل"/>
        </div>

        <div class="flex flex-col gap-2">
          <label class=" text-gray-500 text-xs" for="username">رمز عبور</label>
          <p-password [(ngModel)]="password" [feedback]="false" autocomplete="off" inputStyleClass="w-full"
                      toggleMask="true"/>
        </div>


        <button
          (click)="onLogin()"
          [disabled]="loading()"
          [ngClass]="{
    'hover:opacity-90': !loading(),
    ' cursor-not-allowed opacity-50': loading()
  }"
          class="w-full cursor-pointer text-center bg-gradient-to-l from-[#148691] to-[#216067]  px-5 py-3 rounded-md text-white transition-all duration-300 flex items-center justify-center gap-2"
        >
          @if (!loading()) {
            ورود
          } @else {
            <i class="pi pi-spin pi-spinner text-white text-sm"></i>
          }
        </button>


        <div class="flex flex-row gap-3">
          <p class="text-xs text-gray-400">رمز عبور خود را فراموش کرده اید؟</p>
          <p class="text-xs cursor-pointer text-[#148591] underline" routerLink="/forget">فراموشی رمز عبور</p>
        </div>

      </div>
    </div>
    <img class="w-1/2 h-auto" src="images/png/login.jpg">

  </div>

</div>
