<div class="absolute inset-0 min-w-full min-h-full z-0">
  <img class="w-full h-full object-cover opacity-50" src="images/jpg/bg.png"/>
</div>

<div class="relative flex flex-col items-center justify-center min-h-screen">
  <div class="flex flex-row items-center justify-center z-10 w-200 h-auto rounded-2xl bg-white gap-20 p-20 shadow-xl">

    <div class="flex flex-col gap-5 w-2/3 items-center">

      <img [src]="APP_CONFIG.logoURL" class="w-1/2">

      <div class="self-start flex flex-col gap-5 w-full">
        <p class="text-sm text-[#148591]">فراموشی رمز عبور</p>

        <!-- ورودی نام کاربری -->
        <div class="flex flex-col gap-2">
          <label class="text-gray-500 text-xs" for="username">نام کاربری</label>
          <div class="flex gap-2">
            <input
              [(ngModel)]="username"
              class="placeholder:text-xs flex-1"
              id="username"
              pInputText
              placeholder="ایمیل"
              type="text"/>


            <button
              (click)="sendCode()"
              [class]="(timerActive && remainingTime > 0) ?
                       'bg-gray-400 px-4 py-2 rounded-md text-white text-xs whitespace-nowrap transition-all duration-300 min-w-20 flex items-center justify-center gap-2 cursor-not-allowed' :
                       'bg-gradient-to-l from-[#148691] to-[#216067] px-4 py-2 rounded-md text-white text-xs whitespace-nowrap transition-all duration-300 min-w-20 flex items-center justify-center gap-2'"
              [disabled]="loading() || !username || (timerActive && remainingTime > 0)"
              class="w-30">

              @if (loading()) {
                <i class="pi pi-spin pi-spinner text-white text-xs"></i>
              }

              @if (!loading()) {
                @if (timerActive && remainingTime > 0) {
                  ارسال مجدد ({{ formatTime(remainingTime) }})
                } @else {
                  {{ codeSent ? 'ارسال مجدد' : 'ارسال کد' }}
                }
              }
            </button>
          </div>
          @if (haveError()) {
            <p class="text-xs text-red-600">لطفا ایمیل معتبری وارد کنید</p>
          }
        </div>

        <!-- کادر وارد کردن کد -->
        <div class="flex flex-col gap-3 w-full">
          <label class="text-gray-500 text-xs" for="verificationCode">کد تأیید</label>
          <p-input-otp
            [(ngModel)]="verificationCode"
            [disabled]="!codeSent"
            [length]="6"
            styleClass="w-full justify-start gap-2"> <!-- تغییر به justify-start -->

            <ng-template let-events="events" let-value pTemplate="input">
              <input
                (blur)="events.blur($event)"
                (focus)="events.focus($event)"
                (input)="events.input($event)"
                (keydown)="events.keydown($event)"
                [disabled]="!codeSent"
                [value]="value.value"
                class="custom-otp-input"
                type="text"/>
            </ng-template>

          </p-input-otp>
        </div>        <!-- دکمه تایید -->
        <button
          (click)="verifyCode()"
          [class]="canVerify() ?
                   'w-full text-center bg-gradient-to-l from-[#148691] to-[#216067] px-5 py-3 rounded-md text-white transition-all duration-300 flex items-center justify-center gap-2' :
                   'w-full text-center bg-gray-400 px-5 py-3 rounded-md text-white transition-all duration-300 flex items-center justify-center gap-2 cursor-not-allowed'"
          [disabled]="!canVerify() || verifying"
          class="h-12 cursor-pointer">

          @if (!verifying) {
            تایید کد
          } @else {
            <i class="pi pi-spin pi-spinner text-white text-sm"></i>
          }
        </button>

        <!-- بازگشت -->
        <div class="flex flex-row gap-3 mt-5">
          <p class="text-xs cursor-pointer text-[#148591] underline" routerLink="/login">بازگشت</p>
        </div>
      </div>
    </div>

  </div>
</div>
