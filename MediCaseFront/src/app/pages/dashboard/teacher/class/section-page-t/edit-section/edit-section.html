<p-dialog
  (onHide)="onHide()"
  [(visible)]="visible"
  [dismissableMask]="true"
  [modal]="true"
  [style]="{ width: '30rem' }"
  header="ویرایش اطلاعات کلاس"
>
  <div class="flex items-center gap-4 justify-between mb-4 w-full">
    <label class="font-semibold " for="username">نام کلاس</label>
    <input [(ngModel)]="data.new_name" autocomplete="off" class=" w-60" id="username" pInputText/>
  </div>

  <div class="flex items-center gap-4 mb-8  w-full justify-between">
    <label class="font-semibold " for="email">ترم تحصیلی</label>
    <p-select [(ngModel)]="data.semester_code" [options]="semesters" class="w-60 " optionLabel="code"
              optionValue="code"
              placeholder="انتخاب ترم"/>
  </div>
  <div class="flex items-center gap-4 mb-8 w-full justify-between">
    <label class="font-semibold">تاریخ شروع کلاس</label>
    <input (ngModelChange)="updateMinEndDate($event)"
           [(ngModel)]="start_date"
           class="font-Vazirmatn w-60"
           data-jdp
           data-jdp-min-date="today"
           pInputText/>
  </div>

  <div class="flex items-center gap-4 mb-8 w-full justify-between">
    <label class="font-semibold">تاریخ پایان کلاس</label>
    <input [(ngModel)]="end_date"
           class="font-Vazirmatn w-60"
           data-jdp
           id="end-date-input"
           pInputText/>
  </div>

  <div class="flex items-center gap-4 mb-8 w-full justify-between">
    <label class="font-semibold" for="desc">توضیحات</label>
    <textarea [(ngModel)]="data.description" class="w-60" id="desc" pInputText placeholder="توضیحات کلاس"></textarea>
  </div>

  <div class="flex justify-end gap-2">
    <p-button (click)="visible = false" label="بازگشت" severity="secondary"/>
    <p-button (click)="Confirm()" label="ویرایش"/>
  </div>


</p-dialog>
