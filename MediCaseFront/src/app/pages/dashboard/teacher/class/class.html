<div class="w-full flex flex-col gap-10 p-10">

  <!--  بخش هدر-->
  <app-dash-nav-t title="کلاس ها"></app-dash-nav-t>

  <!--  بخش محتوا-->
  <div class="flex flex-col w-full gap-10">

    <div class="flex w-full flex-row items-center justify-between px-10">
      <p class="text-gray-500 text-sm">{{ classes.length }} کلاس یافت شد</p>
      <p
        (click)="isModalOpen=true; visible=true"
        class="cursor-pointer rounded-lg px-5 py-3 text-white text-sm font-thin bg-gradient-to-r from-[#148691] to-[#216067]">
        افزودن
        کلاس </p>
    </div>

    <div class="grid grid-cols-3 gap-10 items-stretch px-10">
      @for (c of classes; track c) {
        <app-classes-card [clas]="c"></app-classes-card>
      }
    </div>

  </div>

</div>


<app-addsection
  (close)="isModalOpen = false"
  [show]="isModalOpen"
></app-addsection>
