<div class="w-full flex flex-col gap-10 p-10">

  <app-dash-nav [welcome]="false" title="کلاس ها"></app-dash-nav>

  @if (classes.length != 0) {
    <div class="grid grid-cols-3 gap-10 items-stretch px-10">
      @for (c of classes; track c) {
        <app-classes-card [clas]="c"></app-classes-card>
      }
    </div>
  } @else {
    <div class="w-full items-center justify-center h-100 flex flex-col">
      <p class="text-gray-500">کلاسی یافت نشد</p>
    </div>
  }
</div>
