<div class="w-full flex flex-col gap-10 p-10">

  <app-dash-nav [welcome]="false" title="حساب کاربری"></app-dash-nav>


  <!--  بخش بالا که آواتار و باکس اول رو داره-->
  <div class="flex w-full flex-row items-center justify-between gap-20">

    <!--    باکس راست آواتار و نقش-->
    <div class="flex flex-row gap-10 items-center w-1/3">

      <!--      باکس آواتار-->
      <div class="w-1/2 flex flex-col gap-2 items-center">
        <img
          [src]="user.profile"
          class="w-40 h-40 object-cover rounded-full border-2 border-white"
        />
        <p (click)="isModalOpen=true; visible=true" class="cursor-pointer text-gray-500 text-xs underline">تغییر
          آواتار</p>
      </div>

      <!--      باکس خلاصه اطلاعات کاربر-->
      <div class="w-1/2 flex flex-col text-gray-500 text-sm gap-3">
        <p class="font-bold text-xl text-black self-center">{{ user.first_name + ' ' + user.last_name }}</p>

        <div class="flex flex-row gap-2 items-center">
          <img src="images/svg/user-follow-line.svg">
          @if (user.role == 'student') {
            <p>نقش : دانشجو</p>
          } @else if (user.role == 'teacher') {
            <p>نقش : استاد</p>
          } @else {
            <p>نقش : ادمین</p>
          }
        </div>
        <div class="flex flex-row gap-2 items-center">
          <img src="images/svg/stethoscope-line.svg">
          <p>رشته : پزشکی</p>
        </div>
        <div class="flex flex-row gap-2 items-center">
          <img src="images/svg/hospital-line.svg">
          <p>علوم پزشکی اصفهان</p>
        </div>

      </div>
    </div>

    @if (user) {
      <app-personal-info [user]="user" class="w-2/3"></app-personal-info>
    }
  </div>

  <!--  بخش دوم : اطلاعات تحصیلی-->
  <div class="flex w-full">
    @if (user) {
      <app-eduction-info [user]="user" class="w-full"></app-eduction-info>
    }
  </div>
</div>


<app-set-profile-image
  (close)="isModalOpen = false"
  [show]="isModalOpen"
></app-set-profile-image>
