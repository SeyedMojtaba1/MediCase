<div class="flex flex-col p-2 h-full shadow-[0_0_10px_0_rgba(0,0,0,0.03)] bg-white rounded-xl justify-between">
  <div>
    @if (localStorage.getItem("role") == "student") {
      <img [routerLink]="'/dashboard/s/class/' + clas.section_id" [src]="clas.section_image"
           class="cursor-pointer rounded-lg">
    } @else {
      <img [routerLink]="'/dashboard/t/class/' + clas.section_id" [src]="clas.section_image"
           class="cursor-pointer rounded-lg">
    }
  </div>
  <div class="flex flex-col gap-2 p-2 items-center justify-between h-full">
    @if (localStorage.getItem("role") == "student") {
      <p class="text-center cursor-pointer" [routerLink]="'/dashboard/s/class/' + clas.section_id">{{ clas.name }}</p>
    } @else {

      <p [routerLink]="'/dashboard/t/class/' + clas.section_id" class="text-center cursor-pointer">{{ clas.name }}</p>

    }
    <p class="text-gray-500 text-xs text-center">
      {{ teacher }}
    </p>

    <!--    <div class="w-full h-[1px] bg-gray-500/50"></div>-->
    <!--    توضیحات متا-->
    <div class="w-full flex flex-row justify-between items-center mb-[-4px] mt-3">
      <div class="flex flex-row gap-1 items-center">
        <img src="images/svg/user.svg">
        <p class="text-xs text-gray-400">{{ clas.student_count }}</p>
      </div>

      <div class="flex flex-row gap-1 items-center">
        <img src="images/svg/bill-line.svg">
        <p class="text-xs text-gray-400">{{ clas.semester_code }}</p>
      </div>
    </div>

  </div>

</div>
