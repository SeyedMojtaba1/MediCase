<!--کارت کلاس ها-->
<app-card>

  <!--  هدر کارت-->
  <div class="flex flex-row items-center justify-between">
    <p class="text-lg font-bold">
      لیست کلاس ها
    </p>
    @if (localStorage.getItem('role') == 'student') {
      <p class="text-gray-500 text-xs cursor-pointer" routerLink="/dashboard/s/class">
        مشاهده همه
      </p>
    } @else {
      <p class="text-gray-500 text-xs cursor-pointer" routerLink="/dashboard/t/class">
        مشاهده همه
      </p>
    }

  </div>

  <!--  لیست کلاس ها-->
  <div class="grid grid-cols-3 gap-5 items-stretch">
    @if (list.length != 0) {
      @for (class of list; track class) {
        <app-classes-card [clas]="class"></app-classes-card>
      }
    } @else {
      <p class="w-full text-center text-sm col-span-3 py-5 text-gray-500">کلاسی یافت نشد</p>
    }
  </div>
</app-card>
