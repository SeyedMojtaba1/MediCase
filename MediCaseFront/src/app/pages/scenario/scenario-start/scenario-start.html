<div class="w-full items-center justify-center pt-10 pb-5 flex">
  <div class="video-bg">
    <video
      autoplay
      id="myVideo"
      loop
      muted
      playsinline
      src="https://elmkhah.ir/wp-content/uploads/2025/12/Premium_Logo_Animation_Generation_Request.mp4">
      مرورگر شما از تگ ویدیو پشتیبانی نمی‌کند.
    </video>
  </div>
</div>

<!--<p class="w-full text-gray-500 items-center text-center pt-10">-->
<!--  آیا می دانید؟-->
<!--</p>-->
<div class="a">
  <p class="w-full text-sm text-gray-700 items-center text-center mb-5 pt-15">
    {{ randomText() }}
  </p>

  <div class="flex justify-center">
    <p-progress-bar
      [style]="{
      '--p-progressbar-background': '#fff',
      '--p-progressbar-value-background': '#148591',
      '--p-progressbar-height': '40px',
      '--p-progressbar-label-color': '#fff',
      '--p-progressbar-label-font-size': '1rem',
      '--p-progressbar-border-radius': '5px'
    }"
      [value]="value()"
      style="width: 100%; max-width: 600px;"
    ></p-progress-bar>
  </div>


  @if (value() == 100) {
    <div class="flex w-full p-5 justify-center items-center">


      <button
        routerLink="/scenario"
        [ngClass]="{
            'bg-[#148591]': true,
            'hover:bg-[#0f747c] active:translate-y-1 active:shadow-[0_2px_0_#0f6c74]': true,
        }"
        class="flex flex-row gap-3 items-center
               text-white
               font-semibold
               px-6
               cursor-pointer
               py-3
               rounded-2xl
               shadow-[0_4px_0_#0f6c74]
               transition-all
               duration-150"
      >
        <i class="pi pi-user"></i>
        <p>ویزیت بیمار</p>
      </button>

    </div>


  }

</div>
