<div class="w-full h-screen flex overflow-hidden">

  <!-- Right -->
  <div class="w-1/5 text-white p-6 flex flex-col">

    <!-- Logo -->
    <div class="flex flex-col items-center gap-3 mb-6">
      <img [src]="logo" class="h-20"/>
      <img [src]="APP_CONFIG.olomURL" class="h-20">

    </div>

    <!-- Sections -->
    <div class="flex flex-col w-full gap-5">
      @for (section of sections; track section) {
        <button (click)="playClick(); selectSection(section)"
                [ngClass]="activeSection==section.id ? 'bg-[#0f747c]' : 'bg-[#148591]' "
                class=" cursor-pointer flex flex-row gap-3 items-center
    bg-[#148591]
    text-white
    font-semibold
    px-6
    py-3
    rounded-2xl
    shadow-[0_4px_0_#0f6c74]
    hover:bg-[#0f747c]
    active:translate-y-1
    active:shadow-[0_2px_0_#0f6c74]
    transition-all
    duration-150
  "
        >
          <i [class]="section.icon + ' text-2xl'"></i>
          <p>{{ section.title }}</p>

        </button>
      }
      <p class="text-gray-500 text-sm underline text-center cursor-pointer">بازگشت به داشبورد</p>

    </div>

  </div>

  <div class="w-1/5 bg-[#148591] text-white p-6 flex flex-col overflow-y-auto">
    <div class="flex flex-col gap-4">

      @for (q of questions; track q) {
        <div
          [ngClass]="q.visible ? 'bg-gray-400/50' : 'bg-[#0f6c74]/40' "
          class="
        text-white
        rounded-2xl
        shadow-[0_4px_0_#0f6c74]
        transition-all duration-200
        cursor-pointer
      "
          (click)="toggleQuestion(q)"
        >
          <!-- Question header -->
          <div class="px-5 py-4 flex justify-between items-center">
            <p class="font-light text-md">
              {{ q.title }}
            </p>

            <i
              class="pi"

              [ngClass]="q.visible ? q.open ? 'pi-chevron-up' : 'pi-chevron-down' : 'pi-lock'"
            ></i>
          </div>

          <!-- Answer -->
          @if (q.open) {
            <div
              class="bg-[#0f6c74] px-5 py-4 rounded-b-2xl animate-fadeIn"
            >
              <p class="text-white text-sm leading-7">
                {{ q.answer }}
              </p>
            </div>
          }
        </div>
      }

    </div>


  </div>


  <!-- Left image -->
  <div
    [style.backgroundImage]="'url(images/jpg/rie.jpg)'"
    class="w-3/5 h-full bg-cover bg-center"
  >

    <div>

    </div>
  </div>
</div>
