<div class="w-full flex flex-col gap-10 p-10">

  <!--  بخش هدر-->
  <app-dash-nav-t [welcome]="false" title="پروفایل کاربر مدیکیس"></app-dash-nav-t>

  <!--  بخش محتوا-->
  <div class="flex flex-col w-full gap-10">

    <!--    باکس راست آواتار و نقش-->
    <div class="flex flex-row gap-10 items-center w-1/3">

      <!--      باکس آواتار-->
      <div class="w-1/2 flex flex-col gap-2 items-center">
        <img [src]="user.profile_image" class="rounded-full border-2 border-white ">
      </div>

      <!--      باکس خلاصه اطلاعات کاربر-->
      <div class="w-1/2 flex flex-col text-gray-500 text-sm gap-3">
        <p class="font-bold text-xl text-black self-center">{{ user.first_name + ' ' + user.last_name }}</p>

        <div class="flex flex-row gap-2 items-center">
          <img src="images/svg/user-follow-line.svg">
          @if (user.main_role == 'student') {
            <p>نقش : دانشجو</p>
          } @else if (user.main_role == 'teacher') {
            <p>نقش : استاد</p>
          } @else {
            <p>نقش : ادمین</p>
          }
        </div>
        <div class="flex flex-row gap-2 items-center">
          <img src="images/svg/stethoscope-line.svg">
          <p>رشته : {{ user.major }}</p>
        </div>
        <div class="flex flex-row gap-2 items-center">
          <img src="images/svg/hospital-line.svg">
          <p>علوم پزشکی اصفهان</p>
        </div>

      </div>
    </div>

  </div>
</div>
