services:
  nginx:
    image: docker.arvancloud.ir/nginx:stable-perl
    container_name: reverse_proxy
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      medicase:
        condition: service_started

  db:
    image: docker.arvancloud.ir/mysql:8.0
    container_name: django_mysql_db
    volumes:
      - ./data/db_data:/var/lib/mysql
    ports:
      - '3307:3306'
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          '-u${MYSQL_USER}',
          '-p${MYSQL_PASSWORD}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - ./MediCaseBack/secrets/secrets.env

  medicase:
    build: .
    container_name: django_medicase
    command: >
      sh -c "if [ -f /app/MediCaseBack/manage.py ]; then cd /app/MediCaseBack; fi &&
      if [ -f /app/manage.py ]; then echo 'Found manage.py in root'; else echo 'ERROR: manage.py not found in /app or /app/MediCaseBack' && ls -R /app; fi &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn MediCaseBack.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - '8000:8000'
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./MediCaseBack/secrets/secrets.env

  redis:
    image: docker.arvancloud.ir/redis:7
    container_name: redis
    ports:
      - '6379:6379'

  celery:
    build: .
    container_name: celery_worker
    restart: unless-stopped
    command: >
      sh -c "cd MediCaseBack/ &&
             celery -A MediCaseBack worker -l info -P solo"
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
    env_file:
      - ./MediCaseBack/secrets/secrets.env

volumes:
  db_data:
  static_volume:
  media_volume:
