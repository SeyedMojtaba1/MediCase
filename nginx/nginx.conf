user  nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 2048;
}

http{
    upstream django_medicase {
        server medicase:8000;
    }
    
    server {
        listen 80;
        # به جای _ نام دامنه خود را وارد کنید
        server_name medicase-isfahan.com www.medicase-isfahan.com;

        access_log  /var/log/nginx/access.log;
        error_log   /var/log/nginx/error.log;

        location / {
            proxy_pass http://django_medicase;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;
        }

        # پیشنهاد: برای فایل‌های استاتیک حتما این بخش را اضافه کن
        location /static/ {
            alias /app/static/; 
        }

        location /media/ {
            alias /app/media/;
        }
    }
}